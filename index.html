<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AS7 68092306 กุลธวัช คงเม่น</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
}

/* video background */

#bgvideo{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
z-index:-1;
object-fit:cover;
}

/* form box */

.form-box{
background:rgba(255,255,255,0.85);
padding:30px;
border-radius:15px;
width:420px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* video control */

.video-control{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
}

</style>

</head>

<body>

<!-- Video Background -->

<video id="bgvideo" autoplay muted loop>
<source src="VDO/204006-923133925_small.mp4" type="video/mp4">
</video>

<!-- Form -->

<div class="form-box">

<h3 class="text-center mb-4">แบบฟอร์มลงทะเบียน</h3>

<form>

<div class="mb-3">
<label class="form-label">ชื่อ-นามสกุล:</label>
<input type="text" class="form-control" placeholder="กรุณากรอกชื่อ-นามสกุล">
</div>

<div class="mb-3">
<label class="form-label">อีเมล:</label>
<input type="email" class="form-control" placeholder="example@domain.com">
</div>

<div class="mb-3">
<label class="form-label">รหัสผ่าน:</label>
<input type="password" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">เพศ:</label><br>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">ชาย</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">หญิง</label>
</div>

</div>

<div class="mb-3">
<label class="form-label">ตำแหน่ง:</label>

<select class="form-select">
<option>Manager</option>
<option>Developer</option>
<option>Designer</option>
<option>Marketing</option>
</select>

</div>

<div class="text-center">

<button type="submit" class="btn btn-primary">
ลงทะเบียน
</button>

<button type="reset" class="btn btn-danger">
ล้างข้อมูล
</button>

</div>

</form>

</div>

<!-- Play Stop -->

<div class="video-control">

<button class="btn btn-warning"
onclick="document.getElementById('bgvideo').play()">
Play </button>

<button class="btn btn-dark"
onclick="document.getElementById('bgvideo').pause()">
Stop </button>

</div>

</body>
</html>
